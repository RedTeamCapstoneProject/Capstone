<!DOCTYPE HTML>
<html>
	<head>
		<title>Reset Password</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<link rel="stylesheet" href="css/main.css" />
	</head>
	<body class="is-preload">
		<div id="wrapper" style="display: block;">
			<header id="header">
				<h1>
					<a href="index.html">Header</a>
				</h1>
				<nav class="main">
					<ul>
						<li>
							<a class="fa-home" href="index.html" title="Home">Home</a>
						</li>
					</ul>
				</nav>
			</header>
			<div id="main">
				<div class="reset-password-container">
					<h2>Reset Password</h2>
					<div id="reset-message" class="auth-message" style="display:none;"></div>
					<div id="reset-form-section">
						<p>Enter your new password below.</p>
						<form id="reset-password-form" class="login-form" method="post" action="#">
							<div class="field password-field-wrapper">
								<label for="new-password">New Password</label>
								<input type="password" id="new-password" name="password" placeholder="New Password" />
								<div id="password-requirements" class="password-requirements">
									<div class="pw-req-item" id="req-length">
										<span class="pw-req-icon">&#10005;</span> Use at least 8 characters
									</div>
									<div class="pw-req-item" id="req-case">
										<span class="pw-req-icon">&#10005;</span> Use upper or lower case characters
									</div>
									<div class="pw-req-item" id="req-number">
										<span class="pw-req-icon">&#10005;</span> Use one or more numbers
									</div>
								</div>
							</div>
							<div class="field">
								<label for="confirm-new-password">Confirm New Password</label>
								<input type="password" id="confirm-new-password" name="confirm-password" placeholder="Confirm New Password" />
							</div>
							<ul class="actions stacked">
								<li>
									<input type="submit" class="large fit" value="Reset Password" />
								</li>
							</ul>
						</form>
					</div>
					<div id="reset-success-section" style="display:none;">
						<p>Your password has been reset successfully.</p>
						<ul class="actions stacked">
							<li>
								<a href="index.html#login-popup" class="button large fit">Go to Log In</a>
							</li>
						</ul>
					</div>
					<div id="reset-invalid-section" style="display:none;">
						<p>This password reset link is invalid or has expired.</p>
						<ul class="actions stacked">
							<li>
								<a href="index.html#forgot-password-popup" class="button large fit">Request a New Link</a>
							</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
		<script src="js/browser.js"></script>
		<script src="js/breakpoints.js"></script>
		<script src="js/util.js"></script>
		<script>
			(function() {
				function getApiBaseUrl() {
					if (window.API_BASE_URL) return window.API_BASE_URL;
					var h = window.location.hostname;
					return (h === 'localhost' || h === '127.0.0.1') ? 'http://localhost:3001' : '';
				}
				var apiBaseUrl = getApiBaseUrl();

				var params = new URLSearchParams(window.location.search);
				var token = params.get('token');

				var formSection = document.getElementById('reset-form-section');
				var successSection = document.getElementById('reset-success-section');
				var invalidSection = document.getElementById('reset-invalid-section');

				if (!token) {
					formSection.style.display = 'none';
					invalidSection.style.display = 'block';
					return;
				}

				function showMsg(text, type) {
					var el = document.getElementById('reset-message');
					el.textContent = text;
					el.className = 'auth-message ' + (type || 'error');
					el.style.display = 'block';
				}

				// Password requirements
				var pw = document.getElementById('new-password');
				var box = document.getElementById('password-requirements');
				if (pw && box) {
					pw.addEventListener('focus', function() { box.classList.add('visible'); });
					pw.addEventListener('blur', function() { if (!pw.value) box.classList.remove('visible'); });
					pw.addEventListener('input', function() {
						var val = pw.value;
						toggleReq('req-length', val.length >= 8);
						toggleReq('req-case', /[a-zA-Z]/.test(val));
						toggleReq('req-number', /[0-9]/.test(val));
						if (val) box.classList.add('visible');
					});
				}
				function toggleReq(id, met) {
					var el = document.getElementById(id);
					if (!el) return;
					el.classList.toggle('met', met);
					el.querySelector('.pw-req-icon').innerHTML = met ? '&#10003;' : '&#10005;';
				}

				var form = document.getElementById('reset-password-form');
				form.addEventListener('submit', async function(e) {
					e.preventDefault();
					var newPassword = document.getElementById('new-password').value;
					var confirmPassword = document.getElementById('confirm-new-password').value;

					if (!newPassword || !confirmPassword) {
						showMsg('Please fill in both fields.', 'error');
						return;
					}
					if (newPassword !== confirmPassword) {
						showMsg('Passwords do not match.', 'error');
						return;
					}
					if (newPassword.length < 8) {
						showMsg('Password must be at least 8 characters.', 'error');
						return;
					}

					try {
						var res = await fetch(apiBaseUrl + '/api/auth/reset-password', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify({ token: token, newPassword: newPassword }),
						});
						var data = await res.json();
						if (res.ok) {
							formSection.style.display = 'none';
							document.getElementById('reset-message').style.display = 'none';
							successSection.style.display = 'block';
						} else {
							if (res.status === 401) {
								formSection.style.display = 'none';
								invalidSection.style.display = 'block';
							} else {
								showMsg(data.error || 'Something went wrong. Please try again.', 'error');
							}
						}
					} catch (err) {
						console.error('Reset password error', err);
						showMsg('Could not reach server. Please try again later.', 'error');
					}
				});

				window.setTimeout(function() {
					document.body.classList.remove('is-preload');
				}, 100);
			})();
		</script>
	</body>
</html>
