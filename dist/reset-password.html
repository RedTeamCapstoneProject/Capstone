<!DOCTYPE HTML>
<html>
	<head>
		<title>Reset Password</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<link rel="stylesheet" href="css/main.css" />
		<style>
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				background: #f5f5f5;
			}
			.reset-password-container {
				background: #fff;
				border-radius: 6px;
				box-shadow: 0 2px 16px rgba(0,0,0,0.12);
				padding: 2.5em 2em;
				width: 100%;
				max-width: 400px;
			}
			.reset-password-container h2 {
				margin-top: 0;
				margin-bottom: 0.5em;
			}
			.reset-password-container p {
				margin-bottom: 1.5em;
				color: #666;
			}
			#reset-password-message {
				display: none;
				margin-top: 1em;
				padding: 0.75em 1em;
				border-radius: 4px;
			}
			#reset-password-message.success {
				background: #e6f4ea;
				color: #2e7d32;
				border: 1px solid #a5d6a7;
			}
			#reset-password-message.error {
				background: #fdecea;
				color: #c62828;
				border: 1px solid #ef9a9a;
			}
		</style>
	</head>
	<body class="is-preload">
		<div class="reset-password-container">
			<h2>Set New Password</h2>
			<p>Enter your new password below.</p>
			<form id="reset-password-form" method="post" action="/api/auth/reset-password">
				<input type="hidden" id="reset-token" name="token" value="" />
				<div class="field password-field-wrapper">
					<label for="new-password">New Password</label>
					<input type="password" id="new-password" name="password" placeholder="New Password" required minlength="8" />
					<div id="password-requirements" class="password-requirements">
						<div class="pw-req-item" id="req-length">
							<span class="pw-req-icon">&#10005;</span> Use at least 8 characters
						</div>
						<div class="pw-req-item" id="req-case">
							<span class="pw-req-icon">&#10005;</span> Use upper or lower case characters
						</div>
						<div class="pw-req-item" id="req-number">
							<span class="pw-req-icon">&#10005;</span> Use one or more numbers
						</div>
					</div>
				</div>
				<div class="field">
					<label for="confirm-password">Confirm Password</label>
					<input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required />
				</div>
				<ul class="actions stacked" style="margin-top:1.5em;">
					<li>
						<input type="submit" class="large fit" value="Reset Password" />
					</li>
				</ul>
			</form>
			<div id="reset-password-message"></div>
			<p id="go-login-wrapper" style="display:none; margin-top: 0.75em; margin-bottom: 0; text-align: center;">
				<a id="go-login-link" href="/#login-popup" class="button">Go to login now</a>
			</p>
			<p style="margin-top:1em;margin-bottom:0;text-align:center;">
				<a href="index.html">Back to Home</a>
			</p>
		</div>

		<script src="js/browser.js"></script>
		<script src="js/breakpoints.js"></script>
		<script src="js/util.js"></script>
		<script src="js/main.js"></script>
		<script>
			(function () {
				// Standalone reset handler for this page, independent of popup scripts.
				var form = document.getElementById("reset-password-form");
				var message = document.getElementById("reset-password-message");
				var goLoginWrapper = document.getElementById("go-login-wrapper");
				var passwordInput = document.getElementById("new-password");
				var requirementsBox = document.getElementById("password-requirements");
				var tokenInput = document.getElementById("reset-token");
				if (!form || !message) return;

				var tokenFromUrl = new URLSearchParams(window.location.search).get("token") || "";
				if (tokenInput) tokenInput.value = tokenFromUrl;

				function toggleReq(id, met) {
					var el = document.getElementById(id);
					if (!el) return;
					if (met) {
						el.classList.add("met");
					} else {
						el.classList.remove("met");
					}
					var icon = el.querySelector(".pw-req-icon");
					if (icon) icon.innerHTML = met ? "&#10003;" : "&#10005;";
				}

				if (passwordInput && requirementsBox) {
					// Live requirement checks to mirror create-account UX.
					passwordInput.addEventListener("focus", function () {
						requirementsBox.classList.add("visible");
					});

					passwordInput.addEventListener("blur", function () {
						if (!passwordInput.value) {
							requirementsBox.classList.remove("visible");
						}
					});

					passwordInput.addEventListener("input", function () {
						var val = passwordInput.value || "";
						toggleReq("req-length", val.length >= 8);
						toggleReq("req-case", /[a-zA-Z]/.test(val));
						toggleReq("req-number", /[0-9]/.test(val));
						if (val) requirementsBox.classList.add("visible");
					});
				}

				form.addEventListener("submit", async function (event) {
					event.preventDefault();
					event.stopPropagation();

					var passwordInput = document.getElementById("new-password");
					var confirmInput = document.getElementById("confirm-password");
					if (!passwordInput || !confirmInput) return;

					var password = passwordInput.value || "";
					var confirmPassword = confirmInput.value || "";
					var token = new URLSearchParams(window.location.search).get("token");

					if (!token) {
						if (goLoginWrapper) goLoginWrapper.style.display = "none";
						message.textContent = "Invalid or missing reset token. Please request a new password reset link.";
						message.className = "error";
						message.style.display = "block";
						return;
					}

					if (password.length < 8) {
						if (goLoginWrapper) goLoginWrapper.style.display = "none";
						message.textContent = "Password must be at least 8 characters.";
						message.className = "error";
						message.style.display = "block";
						return;
					}

					if (password !== confirmPassword) {
						if (goLoginWrapper) goLoginWrapper.style.display = "none";
						message.textContent = "Passwords do not match.";
						message.className = "error";
						message.style.display = "block";
						return;
					}

					try {
						// API expects { token, password } and updates password hash in DB.
						var response = await fetch("/api/auth/reset-password", {
							method: "POST",
							headers: { "Content-Type": "application/json" },
							body: JSON.stringify({ token: token, password: password })
						});

						var result = await response.json();
						if (response.ok) {
							message.textContent = "Password reset successful. Redirecting to login...";
							message.className = "success";
							message.style.display = "block";
							if (goLoginWrapper) goLoginWrapper.style.display = "block";
							form.reset();
							setTimeout(function () {
								window.location.href = "/#login-popup";
							}, 3000);
						} else {
							if (goLoginWrapper) goLoginWrapper.style.display = "none";
							message.textContent = (result && result.error) || "An error occurred. Please try again.";
							message.className = "error";
							message.style.display = "block";
						}
					} catch (_err) {
						if (goLoginWrapper) goLoginWrapper.style.display = "none";
						message.textContent = "An error occurred. Please try again.";
						message.className = "error";
						message.style.display = "block";
					}
				});
			})();
		</script>
	</body>
</html>
